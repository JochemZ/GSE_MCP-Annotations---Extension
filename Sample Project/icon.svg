<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gseGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12B886"></stop>
      <stop offset="100%" stop-color="#087F5B"></stop>
    </linearGradient>
  </defs>

  <!-- Hexagon Background -->
  <polygon points="16,2 29,9 29,23 16,30 3,23 3,9" fill="url(#gseGradient)"></polygon>

  <!-- Connection Lines -->
  <g stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9">
    <line x1="16" y1="12" x2="9.5" y2="20"></line>
    <line x1="16" y1="12" x2="22.5" y2="20"></line>
    <line x1="9.5" y1="20" x2="22.5" y2="20"></line>
  </g>

  <!-- Outer Nodes -->
  <g fill="white">
    <circle cx="9.5" cy="20" r="2"></circle>
    <circle cx="22.5" cy="20" r="2"></circle>
  </g>

  <!-- Center Node with GSE -->
  <circle cx="16" cy="12" r="4.2" fill="white"></circle>

  <text x="16" y="13.8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="4.5" font-weight="700" fill="#087F5B">
    GSE
  </text>

</svg>